name: API — CI

on:
  push:
    paths:
      - 'API/**'
  pull_request:
    paths:
      - 'API/**'

defaults:
  run:
    working-directory: API

jobs:
  test:
    name: Testes (Vitest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: API/package-lock.json

      - name: Instalar dependências
        run: npm ci

      # prisma generate lê apenas o schema.prisma — não precisa de banco real
      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Rodar testes com coverage
        run: npm run test:coverage

      - name: Publicar relatório de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: API/coverage/
          retention-days: 7

  build:
    name: Build TypeScript
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: API/package-lock.json

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Compilar TypeScript
        run: npm run build
