services:
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./API/.env
    restart: unless-stopped
    healthcheck:
      # node:20-slim não tem wget/curl — usa fetch nativo do Node 20
      test: ["CMD", "node", "-e",
        "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  front:
    build:
      context: ./FRONT
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    env_file:
      - ./FRONT/.env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # Alpine tem wget via busybox; /api/health é uma rota Next.js dedicada (sem auth)
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

